<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Uri's GeometryDash</title>
<style>
body { margin:0; overflow:hidden; background:#111; font-family:sans-serif; }
canvas { display:block; background:#222; }
#overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex;
          flex-direction:column; align-items:center; justify-content:center; color:white; font-size:30px; }
button { font-size:20px; padding:10px 20px; margin:10px; cursor:pointer; }
.skin-btn { width:50px; height:50px; border:none; margin:5px; cursor:pointer; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="overlay"></div>

<!-- סאונדים -->
<audio id="jumpSound" src="https://freesound.org/data/previews/341/341695_62476-lq.mp3"></audio>
<audio id="hitSound" src="https://freesound.org/data/previews/109/109662_945474-lq.mp3"></audio>
<audio id="bgMusic" src="https://freesound.org/data/previews/466/466146_838627-lq.mp3" loop></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const jumpSound = document.getElementById("jumpSound");
const hitSound = document.getElementById("hitSound");
const bgMusic = document.getElementById("bgMusic");

function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// משתנים עיקריים
let stageSelected = false;
let currentStage = 0;
let playerColor = 'blue';
let lives = 3;
let player = {x:50, y:0, width:30, height:30, vy:0, jumping:false};
let gravity = 0.4;
let jumpPower = -8;
let obstacles = [];
let stageProgress = 0;
let invincible = false;

// שלבים
let stages = [
    {speed:3, bg:"#87CEFA", length:800},
    {speed:3.5, bg:"#90EE90", length:1000},
    {speed:4, bg:"#FFB6C1", length:1200},
    {speed:4.2, bg:"#FFD700", length:1400},
    {speed:4.5, bg:"#DA70D6", length:1600}
];

// פונקציות תפריט
function showMenu(){
    overlay.style.display = "flex";
    overlay.innerHTML = `
    <div id="menu">
      <div>בחר סקין לדמות:</div>
      <div>
        <button class="skin-btn" style="background:blue" onclick="selectSkin('blue')"></button>
        <button class="skin-btn" style="background:green" onclick="selectSkin('green')"></button>
        <button class="skin-btn" style="background:red" onclick="selectSkin('red')"></button>
        <button class="skin-btn" style="background:yellow" onclick="selectSkin('yellow')"></button>
      </div>
      <div>בחר שלב (1-5)</div>
      <div>
        <button onclick="startStage(1)">שלב 1</button>
        <button onclick="startStage(2)">שלב 2</button>
        <button onclick="startStage(3)">שלב 3</button>
        <button onclick="startStage(4)">שלב 4</button>
        <button onclick="startStage(5)">שלב 5</button>
      </div>
    </div>
    `;
}

function selectSkin(color){ playerColor = color; }

function startStage(stageNumber){
    currentStage = stageNumber-1;
    stageSelected = true;
    overlay.style.display = "none";
    lives = 3;
    stageProgress = 0;
    player.y = canvas.height - player.height;
    player.vy = 0;
    player.jumping = false;
    generateObstacles();
    bgMusic.currentTime = 0;
    bgMusic.play();
}

function resetGame(){
    stageSelected = false;
    showMenu();
    bgMusic.pause();
    bgMusic.currentTime = 0;
}

// מחולל מכשולים
function generateObstacles(){
    obstacles = [];
    let lastX = canvas.width;
    for(let i=0;i<12;i++){
        let size = 15 + Math.random()*10;
        let x = lastX + 300 + Math.random()*200;
        let y = canvas.height - size;
        let type = Math.random()<0.5 ? 'block' : 'triangle';
        obstacles.push({x,y,size,type});
        lastX = x;
    }
}

// ציור שחקן ומכשולים
function drawPlayer(){ ctx.fillStyle = playerColor; ctx.fillRect(player.x, player.y, player.width, player.height); }

function drawObstacles(){
    obstacles.forEach(ob=>{
        if(ob.type==='block'){ ctx.fillStyle='red'; ctx.fillRect(ob.x, ob.y, ob.size, ob.size); }
        else{ ctx.fillStyle='orange'; ctx.beginPath(); ctx.moveTo(ob.x, ob.y+ob.size); ctx.lineTo(ob.x+ob.size/2, ob.y); ctx.lineTo(ob.x+ob.size, ob.y+ob.size); ctx.closePath(); ctx.fill(); }
    });
}

// Progress Bar
function drawProgressBar(){
    const barWidth = 300;
    const barHeight = 20;
    const x = (canvas.width - barWidth)/2;
    const y = 10;
    ctx.fillStyle = "#555";
    ctx.fillRect(x,y,barWidth,barHeight);
    ctx.fillStyle = "#0f0";
    const progress = Math.min(stageProgress/stages[currentStage].length,1);
    ctx.fillRect(x,y,barWidth*progress,barHeight);
    ctx.fillStyle = "white";
    ctx.font="16px Arial";
    ctx.fillText(Math.floor(progress*100)+"%", x+barWidth+10, y+barHeight-5);
}

function drawGame(){
    ctx.fillStyle=stages[currentStage].bg;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawPlayer();
    drawObstacles();
    drawProgressBar();
    ctx.fillStyle="black";
    ctx.font="20px Arial";
    ctx.fillText("Lives: "+lives,10,30);
}

// טיפול בפגיעה
function handleCollision(){
    if(invincible) return;
    invincible = true;
    lives--;
    hitSound.currentTime = 0;
    hitSound.play();
    player.y = canvas.height - player.height;
    player.vy = 0;
    player.jumping = false;
    if(lives <= 0){ resetGame(); return; }
    setTimeout(()=>{ invincible = false; }, 500);
}

// עדכון המשחק
function updateGame(){
    player.vy += gravity;
    player.y += player.vy;
    if(player.y >= canvas.height - player.height){ player.y = canvas.height - player.height; player.vy = 0; player.jumping = false; }

    obstacles.forEach(ob=>{
        ob.x -= stages[currentStage].speed;
        if(ob.x + ob.size < 0){ ob.x = canvas.width + Math.random()*200; stageProgress += 50; }

        // בדיקת פגיעה מדויקת
        if(player.x < ob.x + ob.size && player.x + player.width > ob.x &&
           player.y < ob.y + ob.size && player.y + player.height > ob.y){
            handleCollision();
        }
    });

    if(stageProgress >= stages[currentStage].length){
        stageSelected = false;
        overlay.style.display = "flex";
        overlay.innerHTML = `<div>סיימת את השלב!<br>אחוז סיום: 100%</div>
                             <button onclick="showMenu()">חזור לתפריט</button>`;
        bgMusic.pause();
        bgMusic.currentTime = 0;
    }
}

// לולאת המשחק
function gameLoop(){ if(stageSelected){ updateGame(); drawGame(); } requestAnimationFrame(gameLoop); }

// קפיצה מקלדת
window.addEventListener("keydown", e=>{
    if(stageSelected && e.code==="Space" && !player.jumping){ player.vy = jumpPower; player.jumping = true; jumpSound.currentTime = 0; jumpSound.play(); }
});
// קפיצה בלחיצה על העכבר
window.addEventListener("mousedown", ()=>{
    if(stageSelected && !player.jumping){ player.vy = jumpPower; player.jumping = true; jumpSound.currentTime = 0; jumpSound.play(); }
});
// קפיצה במגע (מובייל/טאבלט)
window.addEventListener("touchstart", (e)=>{
    e.preventDefault();
    if(stageSelected && !player.jumping){ player.vy = jumpPower; player.jumping = true; jumpSound.currentTime = 0; jumpSound.play(); }
}, {passive:false});

showMenu();
gameLoop();
</script>

</body>
</html>
